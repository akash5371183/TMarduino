<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hardware Controller - Pro Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <style>
        :root {
            --bg: #1e1e2e;
            --panel: #282a36;
            --text: #f8f8f2;
            --accent: #bd93f9;
            --accent-hover: #ff79c6;
            --success: #50fa7b;
            --danger: #ff5555;
            --warning: #f1fa8c;
            --surface: #44475a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        h1, h2, h3 { margin-top: 0; color: #fff; }
        .panel {
            background: var(--panel);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input[type="text"], input[type="number"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--surface);
            border-radius: 4px;
            background: #1e1e2e;
            color: white;
            transition: border 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; }
        button {
            background: var(--accent);
            color: #1e1e2e;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            margin-right: 5px;
        }
        button:hover { background: var(--accent-hover); }
        button:disabled { background: var(--surface); cursor: not-allowed; color: #888; }
        
        #webcam-container {
            width: 380px;
            flex-shrink: 0;
            aspect-ratio: 4/3;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--surface);
            margin-bottom: 0;
        }
        #webcam-container canvas { width: 100%; height: auto; }
        
        .mapping-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e2e;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
            border: 1px solid var(--surface);
        }
        .mapping-row input { width: 100px; margin-bottom: 0; }
        
        #console {
            background: #000;
            color: var(--success);
            font-family: 'Courier New', Courier, monospace;
            padding: 10px 15px;
            height: 100px;
            overflow-y: auto;
            border-radius: 8px;
            border: 1px solid var(--surface);
            font-size: 0.85em;
        }

        /* --- Device Connection Styles --- */
        .cm-status { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .status-dot.connected { background: var(--success); box-shadow: 0 0 8px var(--success); }
        
        .btn-disconnect { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-disconnect:hover { background: rgba(255,85,85,0.1); }
        .btn-disconnect:disabled { border-color: #555; color: #555; background: transparent; cursor: not-allowed; }
        
        #baud-rate-container {
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h2>  Vision Model</h2>
        <input type="text" id="model-url" placeholder="Enter Teachable Machine Model URL...">
        <button id="load-model-btn" onclick="initModel()" style="width: 100%; margin-bottom: 15px;">Load Model</button>
        
        <!-- Vision & Settings Layout -->
        <div style="display: flex; gap: 20px; align-items: flex-start; margin-bottom: 15px;">
            <!-- Camera (Left) -->
            <div id="webcam-container"><span>Offline</span></div>
            
            <!-- Settings (Right) -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                <div>
                    <label style="font-size: 0.85em; color: #aaa;">Confidence Threshold</label>
                    <input type="number" id="threshold" value="0.85" step="0.05" min="0" max="1" style="width: 100px; box-sizing: border-box; margin-bottom: 0;">
                </div>
                <div>
                    <label style="font-size: 0.85em; color: #aaa;">Command Debounce (ms)</label>
                    <input type="number" id="debounce" value="500" step="100" min="0" style="width: 100px; box-sizing: border-box; margin-bottom: 0;">
                </div>
            </div>
        </div>

        <!-- Compact Runtime Logs underneath -->
        <h3 style="font-size: 1em; margin-bottom: 8px;">Runtime Logs</h3>
        <div id="console">System booted. Awaiting directives...<br></div>
    </div>

    <div class="panel">
        <h2></i> Hardware Connection</h2>
        
        <!-- Connection List Manager -->
        <div style="background: #21222c; border: 1px solid var(--surface); border-radius: 8px; padding: 15px; margin-bottom: 20px;">
            <div class="cm-status" style="margin-bottom: 15px;">
                <div id="main-status-dot" class="status-dot"></div>
                <span id="main-status-text">Device Connection: Disconnected</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <div>
                    <label style="font-size: 0.85em; color: #aaa;">Target Device Interface:</label>
                    <select id="device-select" onchange="handleDeviceSelect(this)" style="width: 100%; padding: 10px; margin-top: 5px; background: #1e1e2e; color: white; border: 1px solid var(--surface); border-radius: 4px; cursor: pointer;">
                        <option value="none">-- Choose Connection --</option>
                        <option value="serial">USB (COM)</option>
                        <option value="ble">BLE</option>
                        <option value="wifi">Wi-Fi</option>
                    </select>
                </div>
                <div id="baud-rate-container" style="visibility: hidden;">
                    <label style="font-size: 0.85em; color: #aaa;">USB Baud Rate:</label>
                    <select id="baud-rate" onchange="handleBaudSelect(this)" style="width: 100%; padding: 10px; margin-top: 5px; background: #1e1e2e; color: white; border: 1px solid var(--surface); border-radius: 4px; cursor: pointer;">
                        <option value="none">-- Select Baud --</option>
                        <option value="9600">9600</option>
                        <option value="14400">14400</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200">115200</option>
                    </select>
                </div>
            </div>

            <button id="btn-disconnect" class="btn-disconnect" onclick="disconnectAll()" style="width: 100%;" disabled>Terminate Connection</button>
        </div>

        <h3>Command Mapping</h3>
        <p style="font-size: 0.85em; color: #aaa;"></p>
        <div id="mapping-container">
            <i style="color: #666;">Awaiting vision model initialization...</i>
        </div>
    </div>

    <script>
        // --- System State ---
        let model, webcam, maxPredictions;
        let lastCommandTime = 0;
        let lastSentCommand = null;

        // Protocol States
        let activeProtocol = 'none'; // 'none', 'serial', 'ble', 'wifi'
        
        // Serial Variables
        let port, writer; 
        
        // BLE Variables
        let bleDevice, bleServer, bleTxChar;
        const BLE_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e'; // Standard Nordic UART Service
        const BLE_TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';      // Standard Nordic UART RX (Microcontroller side)
        
        // Wi-Fi Variables
        let websocket; 

        const logConsole = document.getElementById('console');
        const mappingContainer = document.getElementById('mapping-container');

        // --- Utility: Logging ---
        function log(message) {
            // Timestamp removed as requested
            logConsole.innerHTML += `<span style="color:#8be9fd">></span> ${message}<br>`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        // --- UI Manager ---
        function updateStatusUI(protocol, statusText, isConnected) {
            document.getElementById('main-status-text').innerText = statusText;
            const dot = document.getElementById('main-status-dot');
            const select = document.getElementById('device-select');
            const baudSelect = document.getElementById('baud-rate');
            const discBtn = document.getElementById('btn-disconnect');
            
            if (isConnected) {
                dot.classList.add('connected');
                select.disabled = true;
                baudSelect.disabled = true;
                discBtn.disabled = false;
            } else {
                dot.classList.remove('connected');
                select.disabled = false;
                baudSelect.disabled = false;
                discBtn.disabled = true;
            }
        }

        function handleDeviceSelect(selectElement) {
            const mode = selectElement.value;
            const baudContainer = document.getElementById('baud-rate-container');
            const baudSelect = document.getElementById('baud-rate');

            if (mode === 'none') {
                baudContainer.style.visibility = 'hidden';
                return;
            }

            if (mode === 'serial') {
                baudContainer.style.visibility = 'visible';
                baudSelect.value = 'none'; 
            } else if (mode === 'ble') {
                baudContainer.style.visibility = 'hidden';
                connectBLE();
            } else if (mode === 'wifi') {
                baudContainer.style.visibility = 'hidden';
                const ip = prompt("Enter Wi-Fi IP Address (e.g., 192.168.1.50):");
                if (ip) {
                    connectWiFi(ip);
                } else {
                    selectElement.value = 'none'; 
                }
            }
        }

        function handleBaudSelect(selectElement) {
            if (selectElement.value !== 'none') {
                connectSerial();
            }
        }

        // --- Teachable Machine Logic ---
        async function initModel() {
            const URL = document.getElementById('model-url').value;
            if (!URL) return alert("System requires a valid Teachable Machine URL.");

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                log("Pulling neural network weights...");
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                log(`Weights loaded. Classes detected: ${maxPredictions}.`);

                webcam = new tmImage.Webcam(400, 300, true); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                generateMappingUI(model.getClassLabels());

            } catch (e) {
                log(`<span style="color:var(--danger)">Exception during initialization: ${e.message}</span>`);
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!model) return;
            const predictions = await model.predict(webcam.canvas);
            
            const threshold = parseFloat(document.getElementById('threshold').value);
            const debounceMs = parseInt(document.getElementById('debounce').value);
            const now = Date.now();

            let highestConfidence = 0;
            let topClass = null;

            for (let i = 0; i < maxPredictions; i++) {
                if (predictions[i].probability > highestConfidence) {
                    highestConfidence = predictions[i].probability;
                    topClass = predictions[i].className;
                }
            }

            if (highestConfidence >= threshold) {
                const commandInput = document.getElementById(`map-${topClass}`);
                if (commandInput && commandInput.value) {
                    const command = commandInput.value;
                    if (command !== lastSentCommand || (now - lastCommandTime) > debounceMs) {
                        sendCommand(command); 
                        lastCommandTime = now;
                        lastSentCommand = command;
                    }
                }
            }
        }

        function generateMappingUI(classes) {
            mappingContainer.innerHTML = "";
            classes.forEach(className => {
                const row = document.createElement('div');
                row.className = 'mapping-row';
                row.innerHTML = `
                    <span><strong style="color:var(--accent)">${className}</strong></span>
                    <input type="text" id="map-${className}" placeholder="Payload" maxlength="10">
                    <button onclick="sendCommand(document.getElementById('map-${className}').value)">Inject</button>
                `;
                mappingContainer.appendChild(row);
            });
        }

        // --- MASTER DATA ROUTER ---
        async function sendCommand(data) {
            if (!data) return;
            log(`Payload [${data}] -> Routing via ${activeProtocol.toUpperCase()}`);
            
            try {
                if (activeProtocol === 'serial' && writer) {
                    const encoder = new TextEncoder();
                    await writer.write(encoder.encode(data + '\n'));
                } 
                else if (activeProtocol === 'ble' && bleTxChar) {
                    const encoder = new TextEncoder();
                    await bleTxChar.writeValue(encoder.encode(data + '\n'));
                }
                else if (activeProtocol === 'wifi' && websocket && websocket.readyState === WebSocket.OPEN) {
                    websocket.send(data + '\n');
                } 
                else {
                    log(`<span style="color:var(--warning)">Warning: Payload dropped. Interface disconnected.</span>`);
                }
            } catch (e) {
                log(`<span style="color:var(--danger)">Transmission Failure: ${e.message}</span>`);
            }
        }

        // --- GLOBAL DISCONNECT ---
        async function disconnectAll(skipUIReset) {
            log("Terminating all active interfaces...");
            
            if (writer) { writer.releaseLock(); writer = null; }
            if (port) { await port.close(); port = null; }
            
            if (bleDevice && bleDevice.gatt.connected) { bleDevice.gatt.disconnect(); }
            bleTxChar = null;
            
            if (websocket && websocket.readyState !== WebSocket.CLOSED) { websocket.close(); }
            
            activeProtocol = 'none';
            updateStatusUI('none', 'Device Connection: Disconnected', false);
            
            if (skipUIReset !== false) {
                document.getElementById('device-select').value = 'none';
                document.getElementById('baud-rate-container').style.visibility = 'hidden';
                document.getElementById('baud-rate').value = 'none';
            }
            
            log("Interfaces safely terminated.");
        }

        // --- 1. USB SERIAL LOGIC ---
        async function connectSerial() {
            await disconnectAll(false);
            if (!("serial" in navigator)) {
                document.getElementById('device-select').value = 'none';
                document.getElementById('baud-rate-container').style.visibility = 'hidden';
                return alert("Web Serial API unsupported in this environment.");
            }

            try {
                const baudRate = parseInt(document.getElementById('baud-rate').value, 10);
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: baudRate });
                writer = port.writable.getWriter();
                
                activeProtocol = 'serial';
                updateStatusUI('serial', `USB (COM): Active [${baudRate}]`, true);
                log(`Universal Serial Bus initialized @ ${baudRate} baud.`);

                port.addEventListener('disconnect', disconnectAll);
            } catch (e) {
                document.getElementById('device-select').value = 'none';
                document.getElementById('baud-rate-container').style.visibility = 'hidden';
                document.getElementById('baud-rate').value = 'none';
                log(`Serial Exception: ${e.message}`);
                if (port) { port = null; }
            }
        }

        // --- 2. BLE (WEB BLUETOOTH) LOGIC ---
        async function connectBLE() {
            await disconnectAll(false);
            if (!("bluetooth" in navigator)) {
                document.getElementById('device-select').value = 'none';
                return alert("Web Bluetooth API unsupported in this environment.");
            }

            try {
                log("Scanning for Bluetooth Low Energy GATT Servers...");
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [BLE_SERVICE_UUID] }],
                    optionalServices: [BLE_SERVICE_UUID]
                });

                log(`Connecting to BLE device: ${bleDevice.name || "Unknown Device"}`);
                bleDevice.addEventListener('gattserverdisconnected', disconnectAll);
                
                bleServer = await bleDevice.gatt.connect();
                const service = await bleServer.getPrimaryService(BLE_SERVICE_UUID);
                bleTxChar = await service.getCharacteristic(BLE_TX_UUID);
                
                activeProtocol = 'ble';
                updateStatusUI('ble', 'BLE: Active', true);
                log("Bluetooth Low Energy tunnel established.");

            } catch (e) {
                document.getElementById('device-select').value = 'none';
                log(`BLE Exception: ${e.message}`);
            }
        }

        // --- 3. WI-FI (WEBSOCKET) LOGIC ---
        async function connectWiFi(ip) {
            await disconnectAll(false);
            ip = ip.trim();
            if (!ip) return alert("Target IPv4 Address required.");

            const wsUrl = `ws://${ip}:81/`;
            log(`Establishing WebSocket handshake with ${wsUrl}...`);
            
            updateStatusUI('wifi', 'Wi-Fi: Synchronizing...', false);

            websocket = new WebSocket(wsUrl);

            websocket.onopen = function() {
                activeProtocol = 'wifi';
                updateStatusUI('wifi', 'Wi-Fi: Active', true);
                log("WebSocket tunnel established.");
            };

            websocket.onerror = function(error) {
                document.getElementById('device-select').value = 'none';
                log("Wi-Fi Exception: Handshake failed. Check IP or Network.");
                disconnectAll();
            };

            websocket.onclose = function() {
                if (activeProtocol === 'wifi') disconnectAll();
            };


        }
    </script>
</body>
</html>
