<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hardware Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <style>
        :root {
            --bg: #1e1e2e;
            --panel: #282a36;
            --text: #f8f8f2;
            --accent: #bd93f9;
            --success: #50fa7b;
            --danger: #ff5555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        h1, h2, h3 { margin-top: 0; }
        .panel {
            background: var(--panel);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        input[type="text"], input[type="number"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #1e1e2e;
            color: white;
        }
        button {
            background: var(--accent);
            color: #1e1e2e;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; }
        #webcam-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #webcam-container canvas { width: 100%; height: auto; }
        .mapping-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e2e;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        .mapping-row input { width: 100px; margin-bottom: 0; }
        #console {
            background: #000;
            color: var(--success);
            font-family: monospace;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border-radius: 4px;
        }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-bottom: 10px; }
        .status.disconnected { background: var(--danger); color: white; }
        .status.connected { background: var(--success); color: #000; }
        .full-width { grid-column: span 2; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>1. Vision Model</h2>
        <input type="text" id="model-url" placeholder="Paste Teachable Machine URL (e.g., https://teachablemachine.withgoogle.com/models/...)">
        <button id="load-model-btn" onclick="initModel()">Load Model & Start Camera</button>
        
        <div style="margin-top: 20px;">
            <div id="webcam-container"><span>Camera Feed Offline</span></div>
            <div id="label-container"></div>
        </div>
        
        <h3>Settings</h3>
        <label>Confidence Threshold: <input type="number" id="threshold" value="0.85" step="0.05" min="0" max="1"></label><br>
        <label>Command Debounce (ms): <input type="number" id="debounce" value="500" step="100" min="0"></label>
    </div>

    <div class="panel">
        <h2>2. Hardware Connection</h2>
        <div id="serial-status" class="status disconnected">Serial: Disconnected</div>
        <br>
        <button id="connect-btn" onclick="connectSerial()">Connect to Microcontroller</button>
        <button id="disconnect-btn" onclick="disconnectSerial()" disabled>Disconnect</button>

        <h3 style="margin-top: 20px;">3. Command Mapping</h3>
        <p style="font-size: 0.9em; color: #aaa;">Map recognized gestures to specific serial characters (e.g., 'C' to close hand, 'O' to open).</p>
        <div id="mapping-container">
            <i>Load a model to generate mappings.</i>
        </div>
    </div>

    <div class="panel full-width">
        <h2>System Logs</h2>
        <div id="console"></div>
    </div>

    <script>
        // --- System State ---
        let model, webcam, maxPredictions;
        let isPredicting = false;
        let port, writer;
        let lastCommandTime = 0;
        let lastSentCommand = null;

        // UI Elements
        const logConsole = document.getElementById('console');
        const mappingContainer = document.getElementById('mapping-container');

        // --- Utility: Logging ---
        function log(message) {
            const time = new Date().toLocaleTimeString();
            logConsole.innerHTML += `[${time}] ${message}<br>`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        // --- Teachable Machine Logic ---
        async function initModel() {
            const URL = document.getElementById('model-url').value;
            if (!URL) return alert("Please enter a valid Teachable Machine URL.");

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                log("Loading model... this may take a moment.");
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                log(`Model loaded successfully. Found ${maxPredictions} classes.`);

                // Setup Webcam
                const flip = true; 
                webcam = new tmImage.Webcam(400, 300, flip); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                // Update UI
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                generateMappingUI(model.getClassLabels());

            } catch (e) {
                log(`Error loading model: ${e.message}`);
            }
        }

        async function loop() {
            webcam.update(); // update the webcam frame
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!model) return;
            const predictions = await model.predict(webcam.canvas);
            
            const threshold = parseFloat(document.getElementById('threshold').value);
            const debounceMs = parseInt(document.getElementById('debounce').value);
            const now = Date.now();

            let highestConfidence = 0;
            let topClass = null;

            // Find the most likely prediction
            for (let i = 0; i < maxPredictions; i++) {
                if (predictions[i].probability > highestConfidence) {
                    highestConfidence = predictions[i].probability;
                    topClass = predictions[i].className;
                }
            }

            // Check if it passes threshold and debounce logic
            if (highestConfidence >= threshold) {
                const commandInput = document.getElementById(`map-${topClass}`);
                if (commandInput && commandInput.value) {
                    const command = commandInput.value;
                    
                    // Only send if the command changed OR enough time has passed
                    if (command !== lastSentCommand || (now - lastCommandTime) > debounceMs) {
                        sendSerialData(command);
                        lastCommandTime = now;
                        lastSentCommand = command;
                    }
                }
            }
        }

        // --- Dynamic Mapping UI ---
        function generateMappingUI(classes) {
            mappingContainer.innerHTML = "";
            classes.forEach(className => {
                const row = document.createElement('div');
                row.className = 'mapping-row';
                row.innerHTML = `
                    <span><strong>${className}</strong></span>
                    <input type="text" id="map-${className}" placeholder="Cmd (e.g. 1)" maxlength="5">
                    <button onclick="sendSerialData(document.getElementById('map-${className}').value)">Test</button>
                `;
                mappingContainer.appendChild(row);
            });
        }

        // --- Web Serial API Logic ---
        async function connectSerial() {
            if (!("serial" in navigator)) {
                alert("Web Serial API not supported in this browser. Please use Google Chrome on a desktop.");
                return;
            }

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 }); // Standard high-speed baud rate
                
                writer = port.writable.getWriter();
                
                const statusBtn = document.getElementById('serial-status');
                statusBtn.className = "status connected";
                statusBtn.innerText = "Serial: Connected";
                
                document.getElementById('connect-btn').disabled = true;
                document.getElementById('disconnect-btn').disabled = false;
                
                log("Hardware connected successfully via Web Serial.");

                // Handle unexpected disconnects
                port.addEventListener('disconnect', () => {
                    log("Hardware disconnected unexpectedly.");
                    disconnectSerial();
                });

            } catch (e) {
                log(`Serial connection failed: ${e.message}`);
            }
        }

        async function disconnectSerial() {
            if (writer) {
                writer.releaseLock();
            }
            if (port) {
                await port.close();
            }
            
            const statusBtn = document.getElementById('serial-status');
            statusBtn.className = "status disconnected";
            statusBtn.innerText = "Serial: Disconnected";
            
            document.getElementById('connect-btn').disabled = false;
            document.getElementById('disconnect-btn').disabled = true;
            log("Hardware disconnected.");
        }

        async function sendSerialData(data) {
            if (!data) return;
            log(`Triggered: Sending command -> [${data}]`);
            
            if (port && port.writable) {
                const encoder = new TextEncoder();
                await writer.write(encoder.encode(data + '\n')); // Append newline for easier C++ parsing
            } else {
                // Fails silently in hardware, but logs in UI so user can test without Arduino connected
                console.warn("Serial not connected. Command not sent."); 
            }
        }
    </script>
</body>
</html>
