<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visino AI Controller</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<style>
/* SAME YOUR STYLE (UNCHANGED) */
body { font-family: Arial; background:#1e1e2e; color:white; }

/* LOGIN STYLE */
#login-container {
    max-width: 300px;
    margin: 100px auto;
    text-align: center;
}
input { padding:10px; width:100%; margin:5px 0; }
button { padding:10px; margin:5px; cursor:pointer; }
</style>
</head>

<body>

<!-- 🔐 LOGIN UI -->
<div id="login-container">
    <h2>Login to Visino</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
</div>

<!-- 🚀 MAIN APP (HIDDEN) -->
<div id="main-app" style="display:none;">

    <!-- YOUR ORIGINAL FULL UI -->
    <!-- (UNCHANGED BELOW) -->

    <h1>AI Hardware Controller</h1>

    <input type="text" id="model-url" placeholder="Paste Teachable Machine URL">
    <button onclick="initModel()">Load Model</button>

    <div id="webcam-container"></div>

    <button onclick="connectSerial()">Connect Arduino</button>
    <button onclick="disconnectSerial()">Disconnect</button>

    <div id="mapping-container"></div>
    <div id="console"></div>

</div>

<script type="module">

/* 🔐 FIREBASE SETUP */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD55xm_qvdUXIqodJQymd7AwL44Fo29tkI",
  authDomain: "visino-auth.firebaseapp.com",
  projectId: "visino-auth",
  storageBucket: "visino-auth.firebasestorage.app",
  messagingSenderId: "83302178608",
  appId: "1:83302178608:web:92481c5cb9f9cfb54bb2f5"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔐 AUTH FUNCTIONS */

function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
        .then(() => alert("Signup Successful"))
        .catch(e => alert(e.message));
}

function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
        .then(() => alert("Login Successful"))
        .catch(e => alert(e.message));
}

/* 🔐 AUTH STATE CONTROL */

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("login-container").style.display = "none";
        document.getElementById("main-app").style.display = "block";
    } else {
        document.getElementById("login-container").style.display = "block";
        document.getElementById("main-app").style.display = "none";
    }
});

/* 🌍 MAKE FUNCTIONS GLOBAL (IMPORTANT FIX) */
window.login = login;
window.signup = signup;

/* ========================= */
/* 🤖 YOUR ORIGINAL SYSTEM   */
/* ========================= */

let model, webcam, maxPredictions;
let port, writer;
let lastCommandTime = 0;
let lastSentCommand = null;

function log(msg){
    document.getElementById("console").innerHTML += msg + "<br>";
}

/* MODEL */
async function initModel() {
    const URL = document.getElementById('model-url').value;
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(400, 300, true);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    document.getElementById("webcam-container").appendChild(webcam.canvas);
    generateMappingUI(model.getClassLabels());
}

async function loop() {
    webcam.update();
    await predict();
    requestAnimationFrame(loop);
}

async function predict() {
    const predictions = await model.predict(webcam.canvas);

    let best = predictions.reduce((a,b)=> a.probability>b.probability?a:b);

    const commandInput = document.getElementById(`map-${best.className}`);
    if(commandInput && commandInput.value){
        sendSerialData(commandInput.value);
    }
}

/* UI */
function generateMappingUI(classes){
    const container = document.getElementById("mapping-container");
    container.innerHTML = "";
    classes.forEach(c=>{
        container.innerHTML += `
        <div>
            ${c} <input id="map-${c}" placeholder="Cmd">
        </div>`;
    });
}

/* SERIAL */
async function connectSerial(){
    port = await navigator.serial.requestPort();
    await port.open({ baudRate:115200 });
    writer = port.writable.getWriter();
    log("Connected");
}

async function disconnectSerial(){
    writer.releaseLock();
    await port.close();
    log("Disconnected");
}

async function sendSerialData(data){
    if(writer){
        const encoder = new TextEncoder();
        await writer.write(encoder.encode(data+"\n"));
    }
}

/* GLOBAL FIX */
window.initModel = initModel;
window.connectSerial = connectSerial;
window.disconnectSerial = disconnectSerial;

</script>

</body>
</html>
